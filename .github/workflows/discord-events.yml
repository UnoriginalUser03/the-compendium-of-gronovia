name: Update Discord Events

permissions:
  contents: write

on:
  workflow_dispatch:        # manual trigger
  push:
    branches:
      - main
  schedule:
    - cron: '0,30 * * * *' # every 30 minutes

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0        # fetch all branches and history
          persist-credentials: true # allows push using GITHUB_TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Setup Node.js (latest)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*' # latest LTS version

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Set environment variables
      - name: Set Discord secrets
        run: |
          echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" >> $GITHUB_ENV
          echo "GUILD_ID=${{ secrets.GUILD_ID }}" >> $GITHUB_ENV

      # Step 5: Run event fetch script
      - name: Run event fetch script
        run: node ./fetchDiscordEvents.js
