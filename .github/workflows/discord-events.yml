name: Update Discord Events

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0,30 * * * *'

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v3

      - name: Install dependencies
        run: npm ci

      - name: Set Discord secrets
        run: |
          echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" >> $GITHUB_ENV
          echo "GUILD_ID=${{ secrets.GUILD_ID }}" >> $GITHUB_ENV

      - name: Run event fetch script
        run: node ./fetchDiscordEvents.js
