name: Update Discord Events

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"

jobs:
  update-main:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: "lts/*"

      - run: npm ci

      - name: Set Discord secrets
        run: |
          echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" >> $GITHUB_ENV
          echo "GUILD_ID=${{ secrets.GUILD_ID }}" >> $GITHUB_ENV

      - name: Fetch Discord events
        run: node ./fetchDiscordEvents.js

      - name: Commit to main if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add static/data/discord-events.json
          git diff --cached --quiet || git commit -m "Update Discord events (main)"
          git push

  update-gh-pages:
    needs: update-main
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare gh-pages worktree
        run: |
          git fetch origin gh-pages
          git worktree add gh-pages-worktree gh-pages

      - name: Copy updated JSON into gh-pages
        run: |
          cp data/discord-events.json gh-pages-worktree/data/discord-events.json

      - name: Commit to gh-pages if changed
        run: |
          cd gh-pages-worktree
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/discord-events.json
          git diff --cached --quiet || git commit -m "Update Discord events (gh-pages)"
          git push
